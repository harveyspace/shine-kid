name: shine_kid
description: AI Sports Analysis Platform for Teenagers
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.1
  
  # Navigation
  go_router: ^13.0.0
  
  # UI
  flutter_screenutil: ^5.9.0
  lottie: ^2.7.0
  fl_chart: ^0.65.0
  
  # Camera & Video
  camera: ^0.10.0
  video_player: ^2.8.0
  image_picker: ^1.0.4
  
  # Network
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: PingFang SC
      fonts:
        - asset: assets/fonts/PingFangSC-Regular.ttf
        - asset: assets/fonts/PingFangSC-Semibold.ttf
          weight: 600
        - asset: assets/fonts/PingFangSC-Medium.ttf
          weight: 500
