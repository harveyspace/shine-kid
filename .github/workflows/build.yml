name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
    
    - name: Create fresh Flutter project
      run: |
        mv pubspec.yaml pubspec_old.yaml
        mv lib lib_backup
        flutter create --org com.shinekid --project-name shine_kid .
        mv pubspec_old.yaml pubspec.yaml
        rm -rf lib
        mv lib_backup lib
      working-directory: ./flutter_app
    
    - name: Set minSdkVersion to 21 for camera plugin
      run: |
        if [ -f android/app/build.gradle.kts ]; then
          sed -i 's/minSdk = .*/minSdk = 21/g' android/app/build.gradle.kts
        fi
        if [ -f android/app/build.gradle ]; then
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle
        fi
      working-directory: ./flutter_app
    
    - name: Install dependencies
      run: flutter pub get
      working-directory: ./flutter_app
    
    - name: Build APK
      run: flutter build apk --debug
      working-directory: ./flutter_app
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: shine-kid-apk
        path: ./flutter_app/build/app/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
    
    - name: Create fresh Flutter project
      run: |
        mv pubspec.yaml pubspec_old.yaml
        mv lib lib_backup
        flutter create --org com.shinekid --project-name shine_kid .
        mv pubspec_old.yaml pubspec.yaml
        rm -rf lib
        mv lib_backup lib
      working-directory: ./flutter_app
    
    - name: Set minSdkVersion to 21 for camera plugin
      run: |
        if [ -f android/app/build.gradle.kts ]; then
          sed -i 's/minSdk = .*/minSdk = 21/g' android/app/build.gradle.kts
        fi
        if [ -f android/app/build.gradle ]; then
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle
        fi
      working-directory: ./flutter_app
    
    - name: Install dependencies
      run: flutter pub get
      working-directory: ./flutter_app
    
    - name: Precache iOS artifacts
      run: flutter precache --ios
      working-directory: ./flutter_app
    
    - name: Build iOS
      run: flutter build ios --release --no-codesign
      working-directory: ./flutter_app
    
    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: shine-kid-ios
        path: ./flutter_app/build/ios/iphoneos/Runner.app
        retention-days: 30